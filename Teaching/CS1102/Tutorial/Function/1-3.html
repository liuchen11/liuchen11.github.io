<!DOCTYPE html>
<html>
<head>
    <title>Task 1.3</title>
    <script>
        var clueQuestion;

        function init(){
            clueQuestion = generateRandom4DigitText();
            document.getElementById("question").innerHTML = clueQuestion + " = ???";
        }

        function generateRandom4DigitText(){
            var i, digit, result;
            result = "";
            for (i=0; i<4; i++) {
                digit = Math.floor(Math.random()*10);
                result = result + digit;
            }
            return result;
        }

        function evaluateClue(clue){
            var i, N = 0; 
            for (i = 0; i < clue.length; i++) {
                var d = Number(clue[i]);
                if (d === 0 || d === 4 || d === 6 || d === 9) {
                    N += 1;
                } else if (d === 8) {
                    N += 2;
                }
            }
            return N;
        }

        function generateOne(){
            var clue = generateRandom4DigitText();
            var result = evaluateClue(clue);
            document.getElementById("clue_area").innerHTML = clue + " = " + result + "<br/>";
        }

        function generateTen(){
            var index, s = "";
            for (index = 0; index < 10; index++) {
                var clue = generateRandom4DigitText();
                var result = evaluateClue(clue);
                s += clue + " = " + result + "<br/>";
            }
            document.getElementById("clue_area").innerHTML = s;
        }

        function generateAllDigits(){}
        function checkAnswer(){}
    </script>
</head>
<body onload="init();">
    <h1>CS1102 Lab 12</h1>
    <p>
        <button id="Button1" onclick="generateOne();">Generate 1</button>
        <button id="Button2" onclick="generateTen();">Generate 10</button>
        <button id="Button3" onclick="generateAllDigits();">Generate all digits</button>
    </p>
    <p><div id="clue_area"> </div></p>    
    <span id="question"></span>
    <input type="text" id="textboxanswer" size="2" maxlength="2">
    <button id="checkButton" onclick="checkAnswer();">Check</button>
    <span id="feedback"></span> 
</body>
</html>
