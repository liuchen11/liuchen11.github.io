<!DOCTYPE html>
<html>
<head>
    <title>Task 1.5</title>
    <script>
        function greeting() {
            var firstname;
            firstname = prompt("What is your first name?");
            document.getElementById("message").innerHTML = "Hello " + firstname + "!";
        }
    </script>
</head>
<body onload="greeting();">
    <div id="message"></div>
</body>
</html>
