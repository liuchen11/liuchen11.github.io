<!DOCTYPE html>
<html>
<head>
    <title>Task 1.3</title>
    <script>
        function init() {
            var sum = [];
            var i, d, s;
            
            for (i = 1; i <= 6; i++) {
                sum[i] = 0;
            }
            
            s = "The outcomes of the dice throws: <br/>";
            for (i = 1; i <= 20; i++) {
                d = Math.floor(Math.random() * 6) + 1;
                sum[d]++;
                s += i + ". " + d + "<br/>";
            }
            
            s += "<br/> The distribution of the dice outcomes: <br/>";
            for (i = 1; i <= 6; i++) {
                s += i + ": " + sum[i] + "<br/>";
            }
            document.getElementById("result").innerHTML = s;
        }
    </script>
</head>
<body onload="init();">
    <div id="result"></div>
</body>
</html>
