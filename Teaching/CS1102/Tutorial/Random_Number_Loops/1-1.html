<!DOCTYPE html>
<html>
<head>
    <title>Task 1.1</title>
    <script>
        function init() {
            // Generates a random integer from -10 to 10
            var d = Math.floor(Math.random() * 21) - 10;
            document.getElementById("result").innerHTML = "The random integer is: " + d;
        }
    </script>
</head>
<body onload="init();">
    <div id="result"></div>
</body>
</html>
